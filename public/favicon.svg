<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#6334da"/>
      <stop offset="1" stop-color="#3f1ba8"/>
    </linearGradient>
    <linearGradient id="check" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2fd672"/>
      <stop offset="1" stop-color="#17a85a"/>
    </linearGradient>
    <linearGradient id="pending" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fbbf24"/>
      <stop offset="1" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="fail" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f87171"/>
      <stop offset="1" stop-color="#dc2626"/>
    </linearGradient>
    <filter id="shadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#160750" flood-opacity="0.5"/>
    </filter>
  </defs>

  <rect width="512" height="512" rx="72" fill="url(#bg)"/>

  <!-- Pipeline lines (root → three branches) -->
  <g stroke="#ffffff" stroke-width="26" stroke-linecap="round" fill="none">
    <line x1="84" y1="256" x2="296" y2="96"/>
    <line x1="84" y1="256" x2="296" y2="256"/>
    <line x1="84" y1="256" x2="296" y2="416"/>
  </g>

  <!-- Pipeline nodes -->
  <g fill="#ffffff" filter="url(#shadow)">
    <circle cx="84"  cy="256" r="44"/>
    <circle cx="296" cy="96"  r="36"/>
    <circle cx="296" cy="256" r="36"/>
    <circle cx="296" cy="416" r="36"/>
  </g>

  <!-- Status boxes: passing / pending / failed -->
  <g filter="url(#shadow)">
    <rect x="364" y="40"  width="112" height="112" rx="20" fill="url(#check)"/>
    <rect x="364" y="200" width="112" height="112" rx="20" fill="url(#pending)"/>
    <rect x="364" y="360" width="112" height="112" rx="20" fill="url(#fail)"/>
  </g>

  <!-- Status symbols -->
  <g stroke="#ffffff" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- ✓ passing -->
    <polyline points="388,98 414,124 455,72"/>
    <!-- — pending -->
    <line x1="390" y1="256" x2="450" y2="256"/>
    <!-- ✗ failed -->
    <line x1="394" y1="390" x2="446" y2="442"/>
    <line x1="394" y1="442" x2="446" y2="390"/>
  </g>
</svg>
